server:
  port: 8001

spring:
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:mem:clients_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sleuth:
    sampler:
      probability: 1.0

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8902/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"

feign:
  circuitbreaker:
    enabled: false

resilience4j:
  retry:
    instances:
      get-all:
        max-attempts: 5
        wait-duration: 1s
        enable-exponential-backoff: true

life:
  expectancy: 76.5